<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPTV Loading</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        position: relative;
      }

      .stars {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: twinkle 3s ease-in-out infinite;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.5);
        }
      }

      .glow-orb {
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.3;
        animation: orbFloat 8s ease-in-out infinite;
      }

      .glow-orb-1 {
        background: #e94560;
        top: 20%;
        left: 30%;
        animation-delay: 0s;
      }

      .glow-orb-2 {
        background: #0f3460;
        bottom: 20%;
        right: 30%;
        animation-delay: -4s;
      }

      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -20px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.9);
        }
      }

      .container {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        z-index: 10;
      }

      .screen-frame {
        position: relative;
        width: 140px;
        height: 100px;
        border: 4px solid #e94560;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(180deg, rgba(233, 69, 96, 0.1) 0%, transparent 100%);
        box-shadow:
          0 0 30px rgba(233, 69, 96, 0.3),
          inset 0 0 30px rgba(233, 69, 96, 0.1);
        animation: screenFlicker 0.1s ease-in-out infinite alternate;
      }

      @keyframes screenFlicker {
        0% {
          opacity: 0.95;
        }
        100% {
          opacity: 1;
        }
      }

      .screen-frame::before {
        content: '';
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 8px;
        background: #1a1a2e;
        border-radius: 4px 4px 0 0;
        border: 2px solid #e94560;
        border-bottom: none;
      }

      .screen-frame::after {
        content: '';
        position: absolute;
        bottom: -30px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 20px;
        background: linear-gradient(90deg, #1a1a2e, #16213e, #1a1a2e);
        border-radius: 0 0 8px 8px;
        border: 2px solid #e94560;
        border-top: none;
      }

      .play-icon {
        font-size: 40px;
        color: #e94560;
        text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
        animation: playPulse 2s ease-in-out infinite;
      }

      @keyframes playPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.2);
          opacity: 0.8;
        }
      }

      .scanline {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.3), transparent);
        animation: scanMove 3s linear infinite;
      }

      @keyframes scanMove {
        0% {
          top: 0;
        }
        100% {
          top: 100%;
        }
      }

      .title-wrapper {
        position: relative;
      }

      .title {
        font-size: 56px;
        font-weight: 800;
        color: white;
        letter-spacing: 8px;
        text-transform: uppercase;
        position: relative;
        animation: glitch 3s infinite;
      }

      .title::before,
      .title::after {
        content: 'IPTV';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      .title::before {
        color: #e94560;
        animation: glitchTop 3s infinite;
        clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
      }

      .title::after {
        color: #0f3460;
        animation: glitchBottom 3s infinite;
        clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
      }

      @keyframes glitch {
        0%,
        90%,
        100% {
          transform: translate(0);
        }
        92% {
          transform: translate(-2px, 1px);
        }
        94% {
          transform: translate(2px, -1px);
        }
        96% {
          transform: translate(-1px, -1px);
        }
        98% {
          transform: translate(1px, 1px);
        }
      }

      @keyframes glitchTop {
        0%,
        90%,
        100% {
          transform: translate(0);
        }
        92% {
          transform: translate(3px);
        }
        94% {
          transform: translate(-3px);
        }
        96% {
          transform: translate(2px);
        }
        98% {
          transform: translate(-2px);
        }
      }

      @keyframes glitchBottom {
        0%,
        90%,
        100% {
          transform: translate(0);
        }
        92% {
          transform: translate(-3px);
        }
        94% {
          transform: translate(3px);
        }
        96% {
          transform: translate(-2px);
        }
        98% {
          transform: translate(2px);
        }
      }

      .subtitle {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-top: 8px;
      }

      .visualizer {
        display: flex;
        align-items: flex-end;
        gap: 4px;
        height: 40px;
        margin-top: 10px;
      }

      .bar {
        width: 6px;
        background: linear-gradient(180deg, #e94560, #f39c12);
        border-radius: 3px;
        animation: barBounce 1s ease-in-out infinite;
      }

      @keyframes barBounce {
        0%,
        100% {
          height: 8px;
        }
        50% {
          height: 35px;
        }
      }

      .bar:nth-child(1) {
        animation-delay: 0s;
      }
      .bar:nth-child(2) {
        animation-delay: 0.1s;
      }
      .bar:nth-child(3) {
        animation-delay: 0.2s;
      }
      .bar:nth-child(4) {
        animation-delay: 0.3s;
      }
      .bar:nth-child(5) {
        animation-delay: 0.4s;
      }
      .bar:nth-child(6) {
        animation-delay: 0.3s;
      }
      .bar:nth-child(7) {
        animation-delay: 0.2s;
      }
      .bar:nth-child(8) {
        animation-delay: 0.1s;
      }
      .bar:nth-child(9) {
        animation-delay: 0s;
      }

      .progress-bar {
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        margin-top: 20px;
        overflow: hidden;
      }

      .progress {
        height: 100%;
        background: linear-gradient(90deg, #e94560, #f39c12);
        border-radius: 2px;
        animation: progressLoad 2s ease-in-out infinite;
      }

      @keyframes progressLoad {
        0% {
          width: 0%;
        }
        50% {
          width: 80%;
        }
        100% {
          width: 0%;
        }
      }

      .hint {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 30px;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div class="stars" id="stars"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container">
      <div class="screen-frame">
        <div class="scanline"></div>
        <span class="play-icon">▶</span>
      </div>

      <div class="title-wrapper">
        <h1 class="title">IPTV</h1>
      </div>
      <p class="subtitle">Media Streaming Platform</p>

      <div class="visualizer">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>

      <div class="progress-bar">
        <div class="progress"></div>
      </div>

      <p class="hint">LOADING STREAM...</p>
    </div>

    <script>
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.animationDuration = 2 + Math.random() * 2 + 's';
        starsContainer.appendChild(star);
      }
    </script>
  </body>
</html>
